# Exists so every push/PR fails fast on lint, type, or test
# regressions. This is M0's "CI pipeline that runs lint + a trivial
# test on every push" deliverable. The postgres service was added in
# M1, whose own testing requirement is integration tests against a
# real database, not a mock. M10 adds a second, independent job for
# the M8 frontend (lint, unit tests, production build) - kept separate
# from the backend job so a frontend failure's log isn't interleaved
# with the backend's, and so the two can run in parallel.
#
# Node is pinned to 20 (an LTS actively supported by msw 2.x) rather
# than left floating: M9/M10 verification found that a newer local
# Node (v24) makes msw fail to intercept `fetch()` entirely, a
# test-tooling/Node-version compatibility gap unrelated to application
# code - see docs/frontend/README.md's "Known limitations". Pinning
# here is what makes `npm test` actually mean something in CI instead
# of failing for a reason that has nothing to do with the PR being
# checked.

name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: isip
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/isip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check and build
        run: npm run build

      - name: Test
        run: npm test
