# Serves the built M8 dashboard as static files and reverse-proxies
# `/api/` to the backend container by its Compose service name -
# `backend` is only resolvable inside the Compose network, so this
# file only works when built into deploy/Dockerfile.frontend and run
# via deploy/docker-compose.prod.yml, not standalone.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React Router client-side routing: any path that isn't a real
    # static file falls back to index.html so a deep link (e.g.
    # /zones/<uuid>) doesn't 404 on a hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
