# Local development stack for the Industrial Safety Intelligence Platform.
#
# Exists to satisfy M0's completion criterion: a fresh clone can run
# `docker compose -f deploy/docker-compose.yml up` and get a healthy
# stack with `GET /api/v1/health` returning 200, with no manual steps.
# Every service below has a real healthcheck (not just start-order)
# because the most common "works on my machine" failure is the
# backend starting before Postgres accepts connections.
#
# Production-deployment audit (see docs/architecture/deployment_readiness.md
# and DEPLOYMENT.md): this file previously also provisioned `redis`/`chroma` services and
# gated the backend's startup on both being healthy, even though no
# code anywhere in `src/` has ever imported a Redis or Chroma client -
# every hackathon judge running `docker compose up` was pulling and
# waiting on two extra images that did nothing. Removed here to match
# the exact principle `docker-compose.prod.yml`'s own header comment
# already stated ("only what real code actually exercises today"):
# add a service back only when a milestone builds its first real
# consumer, not before.

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-isip}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    env_file:
      - ../.env
    environment:
      # Overrides .env's host-relative default: containers reach the
      # db service by its Compose service name, never by localhost.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-isip}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
